services:
  postgres:
    image: postgres:17-alpine
    container_name: justdo-postgres
    environment:
      POSTGRES_USER: justdo
      POSTGRES_PASSWORD: justdo
      POSTGRES_DB: justdo
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U justdo -d justdo"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: justdo-api:latest
    container_name: justdo-api
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: justdo
      PGPASSWORD: justdo
      PGDATABASE: justdo
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3000"
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: justdo-vue:prod
    container_name: justdo-vue-prod
    ports:
      - "8088:80"
    depends_on:
      - api
    restart: unless-stopped

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: justdo-vue:dev
    container_name: justdo-vue-dev
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      - api
    profiles: ["dev"]

volumes:
  pgdata:
